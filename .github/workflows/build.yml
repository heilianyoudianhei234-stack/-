name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.85.3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Flet Build APK
        env:
         CI: "true"
        run: |
          flutter config --no-analytics
          yes | flet build apk --verbose --no-interactive


      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackcat-apk
          path: build/apk/*.apk
